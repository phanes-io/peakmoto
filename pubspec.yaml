name: peakmoto
description: "Free & Open Source motorcycle navigation app. Forever free, no tracking, no account."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Map & Location
  flutter_map: ^7.0.0
  flutter_map_tile_caching: ^9.0.0
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  permission_handler: ^11.1.0

  # Routing & Navigation
  http: ^1.1.0
  flutter_tts: ^4.0.0
  gpx: ^2.2.0

  # State & Navigation
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0

  # UI
  cupertino_icons: ^1.0.8
  url_launcher: ^6.2.0
  wakelock_plus: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/
